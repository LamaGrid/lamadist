#
# Intel x86-64 machine configuration for LamaDist.
#
# Extends the Yocto genericx86-64 BSP with dm-verity partition
# layout, machine-specific dm-verity GUIDs, and output formats.

require conf/machine/genericx86-64.conf

# Inherit all genericx86-64 overrides (kernel COMPATIBLE_MACHINE,
# kernel config fragments, etc.)
MACHINEOVERRIDES =. "genericx86-64:"

require conf/machine/include/lamadist-dmverity.inc
require conf/machine/include/lamadist-tpm2.inc

# dm-verity partition GUIDs (architecture-specific)
DM_VERITY_ROOT_GUID ?= '4f68bce3-e8cd-4db1-96e7-fbcaf984b709'
DM_VERITY_RHASH_GUID ?= '2c7357ed-ebd2-46d9-aec1-23d437ec2bf5'

WKS_FILE = 'lamadist-dmverity-bootdisk.wks.in'
IMAGE_FSTYPES = 'ext4 wic.xz wic.bmap'

# Serial console for headless/debug operation
APPEND:append = ' console=ttyS0,115200'
