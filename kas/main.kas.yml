---
header:
  version: 15

env:
  BB_PRESSURE_MAX_CPU:
  BB_PRESSURE_MAX_IO:
  BB_PRESSURE_MAX_MEMORY:
  BUILDNAME:
  BUILDSTATS_BASE:
  DISTRO_VERSION:
  DISPLAY:
  ICECC_DISABLED:
  ICECC_PARALLEL_MAKE:

build_system: oe

distro: lamadist

defaults:
  repos:
    branch: scarthgap

repos:
  # Package layers
  meta-openembedded:
    url: 'https://github.com/openembedded/meta-openembedded.git'
    path: 'ext/meta-openembedded'
    layers:
      meta-oe:
      meta-filesystems:
      meta-networking:
      meta-perl:
      meta-python:

  meta-clang:
    url: 'https://github.com/kraj/meta-clang.git'
    path: 'ext/meta-clang'
    branch: scarthgap

  # Distro layers
  poky:
    url: 'https://git.yoctoproject.org/poky'
    path: 'ext/poky'
    layers:
      meta:
      meta-poky:
      meta-yocto-bsp:

  meta-lamadist:
    path: 'meta-lamadist'

  # Security layers
  meta-secure-core:
    url: 'https://github.com/Wind-River/meta-secure-core.git'
    path: 'ext/meta-secure-core'
    layers:
      meta-secure-core-common:
      meta-encrypted-storage:
      meta-integrity:
      meta-signing-key:
  #      meta-efi-secure-boot:

  meta-selinux:
    url: 'https://git.yoctoproject.org/meta-selinux'
    path: 'ext/meta-selinux'

  meta-security:
    url: 'https://git.yoctoproject.org/meta-security'
    path: 'ext/meta-security'

  # Common feature layers
  meta-virtualization:
    url: 'https://git.yoctoproject.org/meta-virtualization'
    path: 'ext/meta-virtualization'

  meta-rauc:
    url: 'https://github.com/rauc/meta-rauc.git'
    path: 'ext/meta-rauc'

# Build infrastructure settings.  Only build-environment-specific settings
# should appear here.
#
#  NOTE: Place distro policy in `meta-lamadist/conf/distro`, machine config
#        in `meta-lamadist/conf/machine/.`

local_conf_header:
  Disk monitor: |
    BB_DISKMON_DIRS                     ??= " \
        STOPTASKS,${BUILDSTATS_BASE},10M,100K \
        STOPTASKS,${TMPDIR},1G,100K           \
        STOPTASKS,${DL_DIR},1G,100K           \
        STOPTASKS,${SSTATE_DIR},1G,100K       \
        STOPTASKS,/tmp,100M,100K              \
        HALT,${BUILDSTATS_BASE},1M,5K         \
        HALT,${TMPDIR},100M,1K                \
        HALT,${DL_DIR},100M,1K                \
        HALT,${SSTATE_DIR},100M,1K            \
        HALT,/tmp,10M,1K"

  Build options: |
    # Build metadata
    INHERIT                              += 'buildhistory'
    BUILDHISTORY_COMMIT                   = '1'
    USER_CLASSES                         += 'buildstats buildstats-summary'

    # Icecream distributed build options
    INHERIT                              += 'icecc'
    ICECC_DISABLED                      ??= '1'
    ICECC_PARALLEL_MAKE                 ??= '-j 24'

  Deploy: |
    DEPLOY_DIR = "${TOPDIR}/../deploy"

  # FIXME: Create a private sstate-cache and hashserv server.  Trusting public servers is insecure.
  Cache: |
    # NOTE: SSTATE_DIR is set via env var (container mount at /sstate); do not hardcode here.
    # Hash equivalence disabled until a private hashserv is deployed (see FIXME above).
    # Connecting to the public upstream during bitbake init can cause a 60 s server
    # timeout when DNS or TCP is unreachable from inside the build container.
    # BB_HASHSERVE = 'auto'
    # BB_HASHSERVE_UPSTREAM = 'hashserv.yocto.io:8687'
    # BB_SIGNATURE_HANDLER = 'OEEquivHash'
    SSTATE_MIRRORS = 'file://.* http://sstate.yoctoproject.org/PATH;downloadfilename=PATH'
