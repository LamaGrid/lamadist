  - core-image-minimal
  - intel-microcode

repos:
  meta-intel:
    url: 'https://git.yoctoproject.org/meta-intel'
    path: 'ext/meta-intel'
    branch: scarthgap

  meta-secure-core:
    url: 'https://github.com/Wind-River/meta-secure-core.git'
    path: 'ext/meta-secure-core'
    layers:
      meta-tpm2:

