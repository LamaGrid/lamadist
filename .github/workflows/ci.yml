---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: 'BSP target to build'
        required: false
        default: 'x86_64'
        type: choice
        options:
          - x86_64
          - rk1
          - soquartz
          - orin-nx
          - all

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  BUILDSTATS_BASE: /__w/_buildstats
  SSTATE_DIR: /__w/_sstate
  LAMADIST_HOST_BUILDSTATS_BASE: /__w/_buildstats
  LAMADIST_HOST_SSTATE_DIR: /__w/_sstate
  LAMADIST_CONTAINER_IMAGE: lamadist-builder:latest
  CONTAINER_REGISTRY: registry.local:5000
  BUILDER_UID: '1001'
  # Use overlay storage driver — pods have kernel overlay permissions
  STORAGE_DRIVER: overlay

jobs:
  version:
    name: Version
    runs-on: container-build-set
    container:
      image: mcr.microsoft.com/dotnet/sdk:10.0
    timeout-minutes: 10
    outputs:
      informationalVersion: ${{ steps.gitversion.outputs.informationalVersion }}
      fullSemVer: ${{ steps.gitversion.outputs.fullSemVer }}
      container_build_needed: ${{ steps.check.outputs.build_needed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: git config --global --add safe.directory "${GITHUB_WORKSPACE}"

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.3.3
        with:
          versionSpec: '6.6.x'

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4.3.3

      - name: Check if container rebuild needed
        id: check
        run: |
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"
          BUILD_NEEDED=false

          CHANGES=""
          if [ "${{ github.event_name }}" = "pull_request" ]; then
              git fetch --depth=1 origin "${{ github.base_ref }}"
              CHANGES=$(git diff --name-only FETCH_HEAD -- container/)
          elif [ "${{ github.event_name }}" = "push" ]; then
              if [ "${{ github.ref }}" = "refs/heads/main" ]; then
                  CHANGES=$(git diff --name-only HEAD~1 -- container/ 2>/dev/null || echo "initial push")
              else
                  # On feature branches, compare against main to detect any divergence
                  git fetch origin main
                  CHANGES=$(git diff --name-only origin/main...HEAD -- container/ 2>/dev/null || echo "new branch")
              fi
          fi

          if [ -n "${CHANGES}" ]; then
              echo "Container files changed:"
              echo "${CHANGES}"
              BUILD_NEEDED=true
          else
              echo "No container/ changes, skipping rebuild"
          fi

          echo "build_needed=${BUILD_NEEDED}" >> "$GITHUB_OUTPUT"

  build-container:
    name: Build Container
    needs: version
    if: needs.version.outputs.container_build_needed == 'true'
    runs-on: container-build-set
    container:
      image: quay.io/podman/stable
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure container storage
        run: |
          cat > /etc/containers/storage.conf <<'EOF'
          [storage]
          driver = "overlay"
          [storage.options.overlay]
          mount_program = ""
          EOF
          sed -i 's/^ *//' /etc/containers/storage.conf

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Build and push container image
        run: mise run container:builder:build --ci

  build-x86-64:
    name: Build x86_64
    needs: [version, build-container]
    if: ${{ !cancelled() && (needs.build-container.result == 'success' || needs.build-container.result == 'skipped') }}
    runs-on: yocto-runner-set
    container:
      image: registry.local/lamagrid/lamadist-builder:latest
    env:
      KAS_WORK_DIR: ${{ github.workspace }}
    timeout-minutes: 480
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Clean workspace (main only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          rm -rf "${GITHUB_WORKSPACE}/build/tmp"
          echo "Cleaned build/tmp directory"

      - name: Build
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ] && [ "${{ github.event_name }}" = "push" ]; then
            mise run build --bsp x86_64 --ci --release
          else
            mise run build --bsp x86_64 --ci --qa --include-scans
          fi
        env:
          GITVERSION_INFO_VERSION: ${{ needs.version.outputs.informationalVersion }}
          GITVERSION_FULL_SEM_VER: ${{ needs.version.outputs.fullSemVer }}

      # TODO: Upload build artifacts when ready
      # - name: Upload artifacts
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: build-artifacts-x86_64-${{ github.sha }}
      #     path: deploy/images/
      #     retention-days: 7

  build-rk1:
    name: Build RK1
    needs: [version, build-container]
    if: >-
      !cancelled()
      && (needs.build-container.result == 'success' || needs.build-container.result == 'skipped')
      && github.event_name == 'workflow_dispatch'
      && (inputs.target == 'rk1' || inputs.target == 'all')
    runs-on: yocto-runner-set
    container:
      image: registry.local/lamagrid/lamadist-builder:latest
    env:
      KAS_WORK_DIR: ${{ github.workspace }}
    timeout-minutes: 480
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Clean workspace (main only)
        if: github.ref == 'refs/heads/main'
        run: |
          rm -rf "${GITHUB_WORKSPACE}/build/tmp"
          echo "Cleaned build/tmp directory"

      - name: Build
        run: mise run build --bsp rk1 --ci
        env:
          GITVERSION_INFO_VERSION: ${{ needs.version.outputs.informationalVersion }}
          GITVERSION_FULL_SEM_VER: ${{ needs.version.outputs.fullSemVer }}

  build-soquartz:
    name: Build SOQuartz
    needs: [version, build-container]
    if: >-
      !cancelled()
      && (needs.build-container.result == 'success' || needs.build-container.result == 'skipped')
      && github.event_name == 'workflow_dispatch'
      && (inputs.target == 'soquartz' || inputs.target == 'all')
    runs-on: yocto-runner-set
    container:
      image: registry.local/lamagrid/lamadist-builder:latest
    env:
      KAS_WORK_DIR: ${{ github.workspace }}
    timeout-minutes: 480
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Clean workspace (main only)
        if: github.ref == 'refs/heads/main'
        run: |
          rm -rf "${GITHUB_WORKSPACE}/build/tmp"
          echo "Cleaned build/tmp directory"

      - name: Build
        run: mise run build --bsp soquartz --ci
        env:
          GITVERSION_INFO_VERSION: ${{ needs.version.outputs.informationalVersion }}
          GITVERSION_FULL_SEM_VER: ${{ needs.version.outputs.fullSemVer }}

  build-orin-nx:
    name: Build Orin NX
    needs: [version, build-container]
    if: >-
      !cancelled()
      && (needs.build-container.result == 'success' || needs.build-container.result == 'skipped')
      && github.event_name == 'workflow_dispatch'
      && (inputs.target == 'orin-nx' || inputs.target == 'all')
    runs-on: yocto-runner-set
    container:
      image: registry.local/lamagrid/lamadist-builder:latest
    env:
      KAS_WORK_DIR: ${{ github.workspace }}
    timeout-minutes: 480
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Clean workspace (main only)
        if: github.ref == 'refs/heads/main'
        run: |
          rm -rf "${GITHUB_WORKSPACE}/build/tmp"
          echo "Cleaned build/tmp directory"

      - name: Build
        run: mise run build --bsp orin-nx --ci
        env:
          GITVERSION_INFO_VERSION: ${{ needs.version.outputs.informationalVersion }}
          GITVERSION_FULL_SEM_VER: ${{ needs.version.outputs.fullSemVer }}

  upload-artifacts:
    name: Upload Artifacts
    needs: build-x86-64
    runs-on: yocto-runner-set
    container:
      image: registry.local/lamagrid/lamadist-builder:latest
    timeout-minutes: 5
    steps:
      - name: Placeholder
        run: echo "TODO - Upload build artifacts"
