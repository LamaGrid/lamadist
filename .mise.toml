#
# mise configuration for LamaDist
# See docs/TOOLING.md for usage information.
# Tasks are defined as file tasks in .mise/tasks/

min_version = "2024.9.0"

[env]
# Project root (resolved at runtime)
LAMADIST_PROJECT_DIR = "{{config_root}}"
LAMADIST_CONTAINER_IMAGE = "lamagrid/lamadist-builder:latest"
LAMADIST_HOST_SSTATE_DIR = "{{config_root}}/.cache/sstate"
LAMADIST_HOST_BUILD_DIR = "{{config_root}}/build"
LAMADIST_HOST_DEPLOY_DIR = "{{config_root}}/deploy"
LAMADIST_CONTAINER_CMD = "{{exec(command='sh -c \"command -v podman >/dev/null 2>&1 && echo podman || echo docker\"')}}"
KAS_WORK_DIR = "{{exec(command='echo ${KAS_WORK_DIR:-/0}')}}"
SSTATE_DIR = "{{exec(command='echo ${SSTATE_DIR:-/sstate}')}}"
